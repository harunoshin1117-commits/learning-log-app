<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>勉強ログ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Study Log</p>
        <h1>勉強ログ</h1>
      </div>
      <section class="today-count" aria-label="今日学んだ数">
        <span id="todayCount">0</span>
        <small>今日のログ</small>
      </section>
    </header>

    <nav class="app-nav" aria-label="ページ移動">
      <a class="active" href="index.html">記録</a>
      <a href="calendar.html">カレンダー</a>
      <a href="logs.html">ログ一覧</a>
    </nav>

    <section class="log-form-section" aria-labelledby="formTitle">
      <h2 id="formTitle">今日の学習を記録</h2>
      <form id="logForm" class="log-form">
        <fieldset class="category-field">
          <legend>カテゴリ</legend>
          <label><input type="checkbox" name="categories" value="JavaScript"> JavaScript</label>
          <label><input type="checkbox" name="categories" value="Codex"> Codex</label>
          <label><input type="checkbox" name="categories" value="Git"> Git</label>
          <label><input type="checkbox" name="categories" value="AI活用"> AI活用</label>
          <label><input type="checkbox" name="categories" value="その他"> その他</label>
        </fieldset>

        <div id="otherCategoryField" class="other-category-field" hidden>
          <label for="otherCategoryInput">その他の内容</label>
          <input id="otherCategoryInput" name="otherCategory" type="text" placeholder="例: 英語、資格勉強、読書">
        </div>

        <label for="studyMinutesInput">学習時間（分）</label>
        <input id="studyMinutesInput" name="studyMinutes" type="number" min="0" step="5" placeholder="例: 30">

        <label for="contentInput">学習内容</label>
        <textarea id="contentInput" name="content" rows="5" placeholder="今日学んだこと、試したこと、気づいたことを書く" required></textarea>

        <button type="submit">保存する</button>
        <p id="formMessage" class="form-message" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
